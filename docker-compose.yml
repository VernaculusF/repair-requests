version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: repair_requests_app
    restart: unless-stopped
    working_dir: /app
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=repair_requests
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
    volumes:
      - ./:/app
      - app_storage:/app/storage
      - app_bootstrap:/app/bootstrap/cache
    networks:
      - repair_network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: repair_requests_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: repair_requests
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_ALLOW_EMPTY_PASSWORD: 'no'
    ports:
      - '${DB_PORT:-3306}:3306'
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - repair_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
      interval: 10s

  nginx:
    image: nginx:alpine
    container_name: repair_requests_nginx
    restart: unless-stopped
    ports:
      - '${APP_PORT:-80}:80'
    volumes:
      - ./:/app
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - repair_network
    depends_on:
      - app

networks:
  repair_network:
    driver: bridge

volumes:
  db_data:
    driver: local
  app_storage:
    driver: local
  app_bootstrap:
    driver: local
